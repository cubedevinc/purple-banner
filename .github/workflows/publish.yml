name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: npm package version (without 'v' prefix). Leave empty to use version from package.json
        required: false
        type: string
      dryRun:
        description: run without publishing to npm
        default: false
        type: boolean

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  id-token: write # OIDC for npm Trusted Publishing
  contents: write # commit, tag, GitHub release

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'release:')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: determine version
        id: version
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
            echo "Version from workflow input: $INPUT_VERSION"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version from package.json: $VERSION"
          fi
        env:
          INPUT_VERSION: ${{ inputs.version }}

      - name: check if already released
        id: check
        run: |
          if git tag -l "v$VERSION" | grep -q .; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Tag v$VERSION already exists — skipping release"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Will release v$VERSION"
          fi
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: ensure npm CLI for trusted publishing
        if: steps.check.outputs.skip == 'false'
        run: npm install -g npm@^11.5.1

      - name: install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm install

      - name: update package version
        if: steps.check.outputs.skip == 'false'
        run: npm version $VERSION --no-git-tag-version --allow-same-version
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: build
        if: steps.check.outputs.skip == 'false'
        run: npm run build

      - name: pack
        if: steps.check.outputs.skip == 'false'
        run: npm pack

      - name: commit and push version change
        if: steps.check.outputs.skip == 'false' && inputs.dryRun != true
        run: |
          git config --global user.email "info@cube.dev"
          git config --global user.name "Cube Dev"
          git add .
          git diff --cached --quiet && echo "No changes to commit" || (git commit -am "release: $VERSION" && git push origin HEAD:main)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: create tag and release
        if: steps.check.outputs.skip == 'false' && inputs.dryRun != true
        run: |
          git tag -a v$VERSION -m "release: $VERSION"
          git push origin v$VERSION
          gh release create v$VERSION --title "v$VERSION" --generate-notes ./*.tgz
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: publish to npm
        if: steps.check.outputs.skip == 'false' && inputs.dryRun != true
        run: npm publish --access public
